{% extends 'base.html' %}
{% block content %}
<h2>➕ Добавить фильм</h2>
<div class="input-group mb-3">
    <input type="text" id="searchInput" class="form-control" placeholder="Введите название фильма...">
    <button class="btn btn-primary" onclick="searchMovies()">Найти</button>
</div>
<div id="results" class="mt-3"></div>
<form id="addForm" method="POST" style="display:none;">
    <input type="hidden" name="selected_id" id="selected_id">
</form>
<a href="/" class="btn btn-secondary mt-3">← Назад</a>
<script>
async function searchMovies() {
    const query = document.getElementById('searchInput').value.trim();
    if (query.length < 2) return alert('Введите минимум 2 символа');
    const res = await fetch(`/search_movies?query=${encodeURIComponent(query)}`);
    const movies = await res.json();
    const div = document.getElementById('results');
    if (!movies.length) { div.innerHTML = '<p>Ничего не найдено 😔</p>'; return; }
    let html = '<div class="list-group">';
    movies.forEach(m => {
        html += `<div class="list-group-item d-flex justify-content-between align-items-center">
            <span>${m.title} ${m.year ? '('+m.year+')' : ''} ${m.rating && m.rating !== 'Нет рейтинга' ? '— ⭐'+m.rating : ''}</span>
            <button class="btn btn-sm btn-success" onclick="document.getElementById('selected_id').value=${m.id}; document.getElementById('addForm').submit();">Добавить</button>
        </div>`;
    });
    div.innerHTML = html + '</div>';
}
document.getElementById('searchInput').addEventListener('keypress', e => { if(e.key==='Enter') searchMovies(); });
</script>
{% endblock %}
