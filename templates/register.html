{% extends 'base.html' %}

{% block content %}
<h1 style="margin-bottom: 10px;">📝 Регистрация</h1>
<p style="color: #6b7280; margin-bottom: 30px;">Создайте свой аккаунт</p>

<form method="POST" style="max-width: 500px;">
    <div style="margin-bottom: 20px;">
        <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #374151;">👤 Имя
            пользователя:</label>
        <input type="text" name="username" required
               style="width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 16px;">
    </div>

    <div style="margin-bottom: 20px;">
        <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #374151;">📧 Email:</label>
        <input type="email" name="email" required
               style="width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 16px;">
    </div>

    <div style="margin-bottom: 20px;">
        <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #374151;">🔒 Пароль:</label>
        <input type="password" name="password" required
               style="width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 16px;">
    </div>

    <div style="margin-bottom: 30px;">
        <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #374151;">🔒 Подтвердить
            пароль:</label>
        <input type="password" name="confirm_password" required
               style="width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 16px;">
    </div>

    <button type="submit"
            style="width: 100%; padding: 15px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 20px;">
        ✅ Зарегистрироваться
    </button>
</form>

<p style="text-align: center; color: #6b7280;">
    Уже есть аккаунт? <a href="/login" style="color: #667eea; font-weight: 600; text-decoration: none;">Войти</a>
</p>
{% endblock %}
