{% extends 'base.html' %}
{% block content %}
<h2>✏️ Редактировать {{ item.name }}</h2>
<form method="POST" class="card p-3">
    <div class="mb-3">
        <label class="form-label">📌 Статус просмотра:</label>
        <select name="status" class="form-select">
            <option value="plan" {% if item.how_its_going=='plan' %}selected{% endif %}>📌 В планах</option>
            <option value="watching" {% if item.how_its_going=='watching' %}selected{% endif %}>▶️ Смотрю сейчас</option>
            <option value="completed" {% if item.how_its_going=='completed' %}selected{% endif %}>✅ Просмотрено</option>
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">⭐ Моя оценка (1-5):</label>
        <select name="rating" class="form-select">
            <option value="" {% if not item.my_rating %}selected{% endif %}>Не оценено</option>
            <option value="1" {% if item.my_rating==1 %}selected{% endif %}>⭐ 1 - Ужасно</option>
            <option value="2" {% if item.my_rating==2 %}selected{% endif %}>⭐⭐ 2 - Плохо</option>
            <option value="3" {% if item.my_rating==3 %}selected{% endif %}>⭐⭐⭐ 3 - Нормально</option>
            <option value="4" {% if item.my_rating==4 %}selected{% endif %}>⭐⭐⭐⭐ 4 - Хорошо</option>
            <option value="5" {% if item.my_rating==5 %}selected{% endif %}>⭐⭐⭐⭐⭐ 5 - Отлично</option>
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">📝 Заметки:</label>
        <textarea name="notes" class="form-control" rows="3">{{ item.notes }}</textarea>
    </div>
    <div class="mb-3">
        <label class="form-label">👁️ Количество просмотров:</label>
        <input type="number" name="watch_count" class="form-control" value="{{ item.watch_count }}" min="0">
    </div>
    <button type="submit" class="btn btn-primary">💾 Сохранить</button>
    <a href="/" class="btn btn-secondary ms-2">← Назад</a>
</form>
{% endblock %}
